services:
  postgres:
    image: postgres:16-alpine
    container_name: vsms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vsms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vsms_password}
      POSTGRES_DB: ${POSTGRES_DB:-vsms_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-vsms_user} -d ${POSTGRES_DB:-vsms_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: vsms_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha

volumes:
  postgres_data:
    driver: local
